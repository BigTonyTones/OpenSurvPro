<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSurv Pro - Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>OpenSurv <span style="color: var(--accent-color)">PRO</span></h1>
            <div class="status-badge">
                <div class="status-dot pulse"></div>
                <span id="system-status">System Online</span>
            </div>
        </header>

        <div class="grid">
            <!-- Monitor Status -->
            <div class="card">
                <h2>📺 Active Monitors</h2>
                <div id="monitor-list">
                    <p>Loading monitor data...</p>
                </div>
            </div>

            <!-- Current Screen -->
            <div class="card">
                <h2>🎬 Current Screen</h2>
                <div id="active-screen-info">
                    <h3 id="screen-name">---</h3>
                    <p id="screen-duration">Duration: --s</p>
                    <div class="controls">
                        <button class="btn btn-primary" onclick="nextScreen()">Next Screen</button>
                        <button class="btn" id="pause-btn" onclick="toggleRotation()">Pause</button>
                    </div>
                </div>
            </div>

            <!-- Streams Status -->
            <div class="card" style="grid-column: span 2;">
                <h2>📹 Active Streams</h2>
                <div class="stream-list" id="stream-list">
                    <p>No active streams detected.</p>
                </div>
            </div>
        </div>

        <footer>
            OpenSurv Pro &bull; Advanced Surveillance Dashboard &bull; 2026
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
